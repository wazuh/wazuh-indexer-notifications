# Increase Kotlin daemon heap to avoid OutOfMemoryError during compilation
# on resource-constrained environments (e.g., GitHub Actions with CodeQL).
kotlin.daemon.jvmargs=-Xmx2g -Xms512m

# Increase Gradle daemon heap and enable build optimizations
org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
