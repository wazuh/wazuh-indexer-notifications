name: Security Test and Build Notifications

on: [push, pull_request]

jobs:
  build-linux:
    strategy:
      matrix:
        java: [ 25 ]
    # This job runs on Linux
    runs-on: ubuntu-latest
    name: Build and test Notifications with security-enabled
    steps:
      # This step uses the setup-java Github action: https://github.com/actions/setup-java
      - name: Set Up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin # Temurin is a distribution of adoptium
          java-version: ${{ matrix.java }}

      # This step uses the checkout Github action: https://github.com/actions/checkout
      - name: Checkout Branch
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          cd notifications
          ./gradlew integTest -Dsecurity=true -Dhttps=true --tests '*IT'

      - name: Upload failed logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: logs
          overwrite: 'true'
          path: notifications/build/testclusters/integTest-*/logs/*
